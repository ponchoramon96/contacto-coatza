name: Actualizar Noticias

on:
  schedule:
    - cron: '0 7,13,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install requests feedparser
      - name: Correr scraper
        run: python3 -u scraper.py
        timeout-minutes: 2
      - name: Generar HTML
        run: python3 -u generar_html.py
      - name: Publicar
        run: |
          git config user.name "bot-contacto-coatza"
          git config user.email "bot@contacto-coatza.com"
          git add index.html noticias.json
          git diff --staged --quiet || git commit -m "auto: noticias $(date '+%Y-%m-%d %H:%M')"
          git push
      - name: Avisar Netlify
        run: curl -X POST -d '{}' https://api.netlify.com/build_hooks/69f142dbd656220e32a39e26
